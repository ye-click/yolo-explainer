<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 448">
  <!-- Sky -->
  <rect width="448" height="200" fill="#B0D4F1"/>
  <!-- Road -->
  <rect y="200" width="448" height="248" fill="#666"/>
  <rect y="300" width="448" height="10" fill="#FFD700"/>
  <rect y="360" width="448" height="10" fill="#FFD700"/>
  <!-- Grass -->
  <rect y="200" width="448" height="40" fill="#6B8E23"/>
  <!-- Car (left) centered near (120, 260) in cell (1,3) -->
  <g transform="translate(40, 230) scale(0.8)">
    <rect x="0" y="20" width="120" height="60" rx="15" fill="#e74c3c"/>
    <rect x="10" y="30" width="35" height="25" rx="5" fill="#87CEEB" opacity="0.6"/>
    <rect x="75" y="30" width="35" height="25" rx="5" fill="#87CEEB" opacity="0.6"/>
    <rect x="50" y="30" width="25" height="25" rx="5" fill="#87CEEB" opacity="0.6"/>
    <circle cx="25" cy="80" r="18" fill="#333"/>
    <circle cx="95" cy="80" r="18" fill="#333"/>
  </g>
  <!-- Person (right) centered near (340, 180) in cell (5,2) -->
  <g transform="translate(310, 130)">
    <circle cx="30" cy="20" r="25" fill="#FFDAB9"/>
    <circle cx="22" cy="14" r="4" fill="#333"/>
    <circle cx="38" cy="14" r="4" fill="#333"/>
    <ellipse cx="30" cy="24" rx="5" ry="3" fill="#c97b84"/>
    <rect x="22" y="45" width="16" height="45" rx="8" fill="#3498db"/>
    <rect x="10" y="50" width="12" height="35" rx="4" fill="#3498db"/>
    <rect x="40" y="50" width="12" height="35" rx="4" fill="#3498db"/>
    <rect x="15" y="90" width="30" height="20" rx="4" fill="#2c3e50"/>
    <rect x="5" y="108" width="14" height="22" rx="4" fill="#555"/>
    <rect x="40" y="108" width="14" height="22" rx="4" fill="#555"/>
  </g>
  <!-- Dog (center-left) centered near (200, 100) in cell (3,1) -->
  <g transform="translate(130, 50) scale(0.7)">
    <rect x="40" y="30" width="100" height="70" rx="15" fill="#A0522D"/>
    <rect x="50" y="40" width="80" height="50" rx="8" fill="#D2691E"/>
    <circle cx="60" cy="65" r="22" fill="#C0C0C0"/>
    <circle cx="52" cy="58" r="4" fill="#333"/>
    <circle cx="68" cy="58" r="4" fill="#333"/>
    <ellipse cx="60" cy="70" rx="6" ry="3" fill="#333"/>
    <circle cx="100" cy="40" r="18" fill="#C0C0C0"/>
    <circle cx="96" cy="35" r="3" fill="#333"/>
    <circle cx="104" cy="35" r="3" fill="#333"/>
    <ellipse cx="100" cy="43" rx="4" ry="2" fill="#333"/>
    <!-- Tail -->
    <rect x="0" y="20" width="30" height="8" rx="4" fill="#A0522D" transform="rotate(-30 0 20)"/>
  </g>
</svg>
